name: Generate Snake Animation

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: vivieches
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Apply pink theme
        run: |
          # LIGHT mode - snake rosa, quadrados rosa
          sed -i \
            -e 's/--cs:[^;]*/--cs:#FF1493/g' \
            -e 's/--c1:[^;]*/--c1:#FFB6C1/g' \
            -e 's/--c2:[^;]*/--c2:#FF69B4/g' \
            -e 's/--c3:[^;]*/--c3:#FF1493/g' \
            -e 's/--c4:[^;]*/--c4:#C71585/g' \
            dist/github-contribution-grid-snake.svg

          # DARK mode - adiciona fundo roxo escuro + quadrados visíveis + cobra rosa
          sed -i 's|<svg \([^>]*\)>|<svg \1><rect width="100%" height="100%" fill="#0f0520"/>|g' \
            dist/github-contribution-grid-snake-dark.svg

          sed -i \
            -e 's/--cs:[^;]*/--cs:#FF1493/g' \
            -e 's/--ce:[^;]*/--ce:#2a0f50/g' \
            -e 's/--c0:[^;]*/--c0:#2a0f50/g' \
            -e 's/--c1:[^;]*/--c1:#7b1f6e/g' \
            -e 's/--c2:[^;]*/--c2:#FF69B4/g' \
            -e 's/--c3:[^;]*/--c3:#FF1493/g' \
            -e 's/--c4:[^;]*/--c4:#C71585/g' \
            dist/github-contribution-grid-snake-dark.svg

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
