name: Generate Snake Animation

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: vivieches
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Make snake and dots pink
        run: |
          for f in dist/*.svg; do
            sed -i \
              -e 's/--cs:[^;]*/--cs:#FF1493/g' \
              -e 's/--c1:[^;]*/--c1:#FFB6C1/g' \
              -e 's/--c2:[^;]*/--c2:#FF69B4/g' \
              -e 's/--c3:[^;]*/--c3:#FF1493/g' \
              -e 's/--c4:[^;]*/--c4:#C71585/g' \
              "$f"
          done

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
